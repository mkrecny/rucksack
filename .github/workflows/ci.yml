name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (node ${{ matrix.node }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Rucksack has zero runtime dependencies and no lockfile, so there is
      # nothing to install — just run the Node test runner.
      - run: node --version
      - run: npm test
